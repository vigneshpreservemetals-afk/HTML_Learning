<!DOCTYPE html>
<html>

<head>
    <title> HTML List Types </title>
</head>

<body>

    <h1> Fruits List - Unordered </h1>

    <div class="Fruits List"></div>

    <ul id="fruits" class="fruits">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ul>

    <ul id="fruits" class="fruits" type="Disc">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ul>

    <ul id="fruits" class="fruits" type="cirlce">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ul>

    <ul id="fruits" class="fruits" type="square">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ul>
    
</body>

</html>
