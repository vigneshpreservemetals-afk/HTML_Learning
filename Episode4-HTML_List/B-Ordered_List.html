<!DOCTYPE html>
<html>

<head>
    <title> HTML List Types </title>
</head>

<body>

    <h1> Fruits List - Ordered </h1>

    <div class="Fruits List"></div>

    <ol id="fruits" class="fruits" type="1">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
        </ol>

    <ol id="fruits" class="fruits" type="I">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ol>

    <ol id="fruits" class="fruits" type="i">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ol>

    <ol id="fruits" class="fruits" type="A">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ol>

    <ol id="fruits" class="fruits" type="a">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ol>

    <ol id="fruits" class="fruits" start="1000">
        <li> Orange </li>
        <li> Apple </li>
        <li> Mango </li>
        <li> Banana </li>
    </ol>



</body>

</html>
