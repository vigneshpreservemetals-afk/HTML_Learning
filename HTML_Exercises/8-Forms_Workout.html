<!DOCTYPE html>
<html>
    <head> 

        <title> Forms Sample </title>

    </head>

    <body>

        <form>
        
        <div class="registration_forms-username">
            <label for="username"> <span>Username</span> <span style="color: red;"">*</span> </label>
            <input type="text" name="username" id="username" required>
        </div> &nbsp;&nbsp;

        <div class="registration_forms-password">
            <label for="password"> <span> Password </span> <span style="color: red;"> * </span></label>
            <input type="password" name="password" id="password" required>
        </div> &nbsp;&nbsp;

        <div class="registration_forms-telephone">
            <label for="telephone"> <span> telephone </span> <span style="color: red;"> * </span></label>
            <input type="tel" name="telephone" id="telephone" pattern="[0-9]{6,10}"
            minlength="6" 
            maxlength="10"
            required >
        </div> &nbsp;&nbsp;

        <div class="checkbox">
            <label for="checkbox"> <span> Language </span> <span style="color: red;"> * </span> </label>
            <input type="checkbox" id="lang[]" name="checkbox" value="English"> English
            <input type="checkbox" id="lang[]" name="checkbox" value="tamil"> Tamil
            <input type="checkbox" id="lang[]" name="checkbox" value="french"> French
        </div> &nbsp; &nbsp;

        <div class="radio"> 
            <label for="radio"> <span> Gender </span> <span style="color: red;"> * </span></label>
            <input type="radio" id="gender" name="radio" value="Male"> Male
            <input type="radio" id="gender" name="radio" value="Female"> Female
            <input type="radio" id="gender" name="radio" value="other"> Other
        </div> &nbsp;&nbsp;

        <div class="dob">
            <label for="dob"> <span> DOB </span> <span style="color: red;"> * </span></label>
            <input type="datetime-local" name="timepicker" id="dob" max="2026-08-04">
        </div> &nbsp; &nbsp;

        <div class="Selectbox">
            <select name="dropdown" id="Selectbox"> Fruits </select>
            <label for="Selectfruits"> Select fruits </label>
            <option value=""> Select Fruits
            <option value="orange"> Orange </option>
            <option value="banana"> banana </option>
        </div>

        <div class="buttons"> 
            <button type="submit"> register </button> 
            <button> cancel </button>
        </div>

        </form>


    </body>
</html>
