<!DOCTYPE html>
<html>

<head>
    <title> Forms-Input-Types </title>
</head>

<body>
    <form>

        <div class=" candidate-Name-text-field">
            <label for="candidate Name"> Candidate Name </label>
            <input type="text" name="text-field" id="candidate Name" placeholder="Ex Vignesh Baskaran">
        </div> &nbsp;&nbsp;

        <div class=" password">
            <label for="password"> Password </label>
            <input type="password" name="sample-text" id="password">
        </div> &nbsp;&nbsp;

        <div class="Email">
            <label for="email"> Email </label>
            <input type="email" name="sample-text" id="email">
        </div> &nbsp;&nbsp;

        <div class="dob">
            <label for="dob"> Dob </label>
            <input type="date" name="date-selector" id="dob" max="2026-03-29">
        </div> &nbsp;&nbsp;

        <div class="date with time">
            <label for="date with time"> date with time </label>
            <input type="datetime-local" name="date with time" id="date with time">
        </div> &nbsp;&nbsp;

        <div class="age">
            <label for="age"> Age </label>
            <input type="number" name="number" id="number" max="99">
        </div> &nbsp;&nbsp;

        <div class="checkbox">
            <label for="checkbox"> checkbox </label>
            <input type="checkbox" name="checkbox" id="checkbox" value="tamil"> tamil
        </div> &nbsp;&nbsp;

        <div class="checkbox">
            <label for="checkbox"> checkbox </label>
            <input type="checkbox" name="checkbox" id="checkbox" value="tamil" checked> tamil
        </div> &nbsp;&nbsp;

        <div class="radiobutton">
            <label for="radio"> radiobutton </label>
            <input type="radio" name="radio" id="radio" value="tamil"> tamil
        </div> &nbsp;&nbsp;

        <div class="radiobutton">
            <label for="radio"> radiobutton </label>
            <input type="radio" name="radio" id="radio" value="tamil" checked> tamil
        </div> &nbsp;&nbsp;

        <div class="file">
            <label for="file"> file </label>
            <input type="file" name="file-upload" id="file">
        </div> &nbsp;&nbsp;

        <div class="rich-text-area">
            <label for="address"> Address </label>
            <textarea name="rich-text-area" id="address" rows="10" cols="10"> address </textarea>
        </div> &nbsp;&nbsp;

        <div class="Select-Box">
            <select name="fruits" id="selectbox"> Fruits
                <option value=""> Choose fruits </option>
                <option value=" Orange"> orange </option>
                <option value=" banana"> banana </option>
            </select>
        </div> &nbsp;&nbsp;

        <div class="button"> button
            <input type="button" value="cancel">
            <button type="submit"> Register </button>
        </div>

    </form>
</body>

</html>
