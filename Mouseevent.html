<!DOCTYPE html>
<html>

<head>
    <title> Mouse Event </title>
</head>

<body>

    <h3> Mouse Event </h3>

    <p id="clickevent" type="clickevent" style="color: white; background-color: blue;"
        onmouseover="alert('Hey vignesh, Hello!!!')"
        onmouseleave="alert('Hey vignesh, sorry to see you leaving')">
        Hey Vignesh
    </p>

</body>

</html>
