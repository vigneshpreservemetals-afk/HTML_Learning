<!DOCTYPE html>
<html>

<head>
    <title>
        <h4> Global attribute </h4>
    </title>
</head>

<body>

    <div class="Id Selector">
        <h4> ID Selector </h4>
        <p id="Paragraph_design" tabindex="1"> Welcome to HTML World </p>
        <h1 id="Heading_design" tabindex="6"> Hello HTML </h1>
        <div id="Container" tabindex="3"> Container </div>
        <hr>
    </div>


    <div class="Class Selector">
        <h4> Class Selector </h4>
        <p class="text color white and background red"></p>
        <h1 class="Bg pink and text white"></h1>
        <hr>
    </div>


    <div class="Style Attribute">
        <h4> Style Attribute </h4>
        <p style="color: azure;
    background-color: brown;" tabindex="2"> Am a Style Attribute </p>

        <h1 style="color: red; background-color: azure;" tabindex="4"> Am a Style Atrribute </h1>
    </div>

    <hr>

    <abbr title="Tata Consultancy Services" tabindex="5"> TCG </abbr>"It is one of the top MNC"
    <p> <span title="Tata Consultancy Services" tabindex="7"> TCS </span>"Top MNC Company</p>
    <p contenteditable="true" tabindex="8"> India is the world largest country </p>
    <p hidden> India is the world largest country </p>

</body>

</html>
