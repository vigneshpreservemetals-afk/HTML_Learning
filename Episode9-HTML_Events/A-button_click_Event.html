<!DOCTYPE html>
<html>

<head>
    <title> Button Click Event </title>
</head>

<body>

    <h3> Button Click Event </h3>

    <button id="clickevent" type="clickevent" style="color: white;background-color: red;" onclick="console.log('Hey Vignesh,How are you?')" ondblclick="console.log('What are you doing?')">
        Primary Button
    </button>

    <button id="clickevent" type="clickevent" style="color: white; background-color: blue;"
        onmouseover="alert('Sorry to see you leaving! Bye')">
        Secondary Button
    </button>
</body>

</html>
