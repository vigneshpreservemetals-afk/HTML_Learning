<!DOCTYPE html>
<html>

<head>
    <title> Forms-Input-Types </title>
</head>

<body>
    <form>

        <div class="row">

            <label for="candidate Name">
                <span> candidate Name </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="text" name="text-field" id="candidate Name" placeholder="Ex Vignesh Baskaran" required>
        </div> &nbsp;&nbsp;

        <div class="row">

            <label for="password">
                <span> Password </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="password" name="sample-text" id="password" required>
        </div> &nbsp;&nbsp;

        <div class="row">
            <label for="email">
                <span> Email </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="email" name="sample-text" id="email" required>
        </div> &nbsp;&nbsp;

        <div class="row">
            <label for="dob">
                <span> dob </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="date" name="date-selector" id="dob" max="2026-03-29" required>
        </div> &nbsp;&nbsp;

        <div class="row">
            <label for="date with time">
                <span> Date with Time </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="datetime-local" name="date with time" id="date with time" required>
        </div> &nbsp;&nbsp;

        <div class="row">

            <label for="age">
                <span> Age </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="number" name="number" id="number" max="99" required>
        </div> &nbsp;&nbsp;

        <div class="checkbox">
            <label for="checkbox">
                <span> Language </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="checkbox" name="lang" id="lang[]" value="tamil"> tamil
            <input type="checkbox" name="lang" id="lang[]" value="English"> English
            <input type="checkbox" name="lang" id="lang[]" value="hindi"> hindi
        </div> &nbsp;&nbsp;

        <div class="row">
            <label for="telephone">
                <span> Mobile Number </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="tel" 
            name="Number" 
            id="telephone" 
            pattern="[0-9]{6,10}" 
            minlength="6" 
            maxlength="10" required>
        </div> &nbsp;&nbsp;

        <div class="row">
            <label for="gender">
                <span> Gender </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="radio" name="gender" id="gender" value="male" required> Male
            <input type="radio" name="gender" id="gender" value="female" required> Female
        </div> &nbsp;&nbsp;

        <div class="row">
            <label for="file">
                <span> File </span>
                <span style="color: red;"> * </span>
            </label>
            <input type="file" name="file-upload" id="file">
        </div> &nbsp;&nbsp;

        <div class="row">
            <label for="address"> Address </label>
            <textarea name="rich-text-area" id="address" rows="10" cols="10"> address </textarea>
        </div> &nbsp;&nbsp;

        <div class="row">
            <select name="fruits" id="selectbox" required> Fruits
                <option value=""> Choose fruits </option>
                <option value=" Orange"> orange </option>
                <option value=" banana"> banana </option>
            </select>
        </div> &nbsp;&nbsp;

        <div class="row">
            <button type="submit"> Register </button>
            <input type="button" value="cancel">
            
        </div>

    </form>
</body>

</html>
