<!DOCTYPE html>
<html>

<head>
    <title> Global attribute </title>
</head>

<body>

    <div class="Id Selector">
        <h4> ID Selector </h4>
        <p id="Paragraph_design"> Welcome to HTML World </p>
        <h1 id="Heading_design"> Hello HTML </h1>
        <div id="Container"> Container </div>
        <hr>
    </div>


    <div class="Class Selector">
        <h4> Class Selector </h4>
        <p class="text color white and background red"></p>
        <h1 class="Bg pink and text white"></h1>
        <hr>
    </div>


    <div class="Style Attribute">
        <h4> Style Attribute </h4>
        <p style="color: azure;
    background-color: brown;"> Am a Style Attribute </p>

        <h1 style="color: red; background-color: azure;"> Am a Style Atrribute </h1>
    </div>

    <hr>

    <abbr title="Tata Consultancy Services"> TCG </abbr>"It is one of the top MNC"
    <p> <span title="Tata Consultancy Services"> TCS </span>"Top MNC Company</p>
    <p contenteditable="true"> India is the world largest country </p>

</body>

</html>
